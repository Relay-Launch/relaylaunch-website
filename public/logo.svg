<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" fill="none">
  <!-- Background -->
  <rect width="400" height="480" rx="0" fill="#0F172A"/>

  <!-- Outer circle -->
  <circle cx="200" cy="180" r="120" stroke="#007AFF" stroke-width="2.5" fill="none" opacity="0.6"/>

  <!-- Dashed orbit ring -->
  <circle cx="200" cy="180" r="105" stroke="#007AFF" stroke-width="1.5" stroke-dasharray="6 4" fill="none" opacity="0.35"/>

  <!-- Inner glow ring -->
  <circle cx="200" cy="180" r="90" stroke="#007AFF" stroke-width="1" fill="none" opacity="0.15"/>

  <!-- RL Monogram -->
  <text x="155" y="205" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" fill="#007AFF" letter-spacing="-2">RL</text>

  <!-- Rocket accent (simplified) -->
  <path d="M220 130 L225 115 L230 130 Z" fill="#007AFF" opacity="0.9"/>
  <circle cx="225" cy="108" r="4" fill="#007AFF" opacity="0.7"/>

  <!-- Growth arrow -->
  <path d="M235 170 L255 145 L250 155 L265 140" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="240" cy="165" r="3" fill="#007AFF" opacity="0.6"/>
  <circle cx="250" cy="155" r="3" fill="#007AFF" opacity="0.6"/>
  <circle cx="260" cy="145" r="3" fill="#007AFF" opacity="0.6"/>

  <!-- Circuit nodes at bottom -->
  <line x1="200" y1="260" x2="200" y2="300" stroke="#007AFF" stroke-width="1.5" opacity="0.4"/>
  <circle cx="200" cy="265" r="3" fill="#007AFF" opacity="0.5"/>
  <circle cx="200" cy="300" r="5" fill="none" stroke="#007AFF" stroke-width="1.5" opacity="0.3"/>
  <circle cx="200" cy="300" r="10" fill="none" stroke="#007AFF" stroke-width="1" opacity="0.15"/>
  <circle cx="200" cy="300" r="16" fill="none" stroke="#007AFF" stroke-width="0.5" opacity="0.1" stroke-dasharray="3 3"/>

  <!-- Brand name -->
  <text x="112" y="355" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" letter-spacing="0.5">
    <tspan fill="#FFFFFF">Relay</tspan><tspan fill="#007AFF" font-size="22">&#x25BA;</tspan><tspan fill="#FFFFFF">Launch</tspan>
  </text>

  <!-- Divider line -->
  <line x1="112" y1="368" x2="288" y2="368" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>

  <!-- New slogan -->
  <text x="200" y="395" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#007AFF" text-anchor="middle" letter-spacing="0.5" opacity="0.9">Ops on Autopilot. You on Strategy.</text>

  <!-- Subtle particle dots -->
  <circle cx="280" cy="90" r="1.5" fill="#007AFF" opacity="0.3"/>
  <circle cx="300" cy="110" r="1" fill="#007AFF" opacity="0.2"/>
  <circle cx="120" cy="100" r="1.5" fill="#007AFF" opacity="0.25"/>
  <circle cx="130" cy="130" r="1" fill="#007AFF" opacity="0.15"/>
  <circle cx="270" cy="250" r="1" fill="#007AFF" opacity="0.2"/>
  <circle cx="140" cy="240" r="1.5" fill="#007AFF" opacity="0.15"/>
</svg>
