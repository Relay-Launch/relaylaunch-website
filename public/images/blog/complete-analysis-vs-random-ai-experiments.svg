<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0F172A"/>
  <!-- Grid / analysis pattern -->
  <line x1="200" y1="50" x2="200" y2="580" stroke="#F8FAFC" stroke-width="1" opacity="0.04"/>
  <line x1="400" y1="50" x2="400" y2="580" stroke="#F8FAFC" stroke-width="1" opacity="0.04"/>
  <line x1="600" y1="50" x2="600" y2="580" stroke="#F8FAFC" stroke-width="1" opacity="0.04"/>
  <line x1="800" y1="50" x2="800" y2="580" stroke="#F8FAFC" stroke-width="1" opacity="0.04"/>
  <line x1="1000" y1="50" x2="1000" y2="580" stroke="#F8FAFC" stroke-width="1" opacity="0.04"/>
  <line x1="100" y1="150" x2="1100" y2="150" stroke="#F8FAFC" stroke-width="1" opacity="0.04"/>
  <line x1="100" y1="315" x2="1100" y2="315" stroke="#F8FAFC" stroke-width="1" opacity="0.04"/>
  <line x1="100" y1="480" x2="1100" y2="480" stroke="#F8FAFC" stroke-width="1" opacity="0.04"/>
  <!-- Magnifying glass / analysis focal point -->
  <circle cx="500" cy="280" r="120" stroke="#007AFF" stroke-width="2.5" opacity="0.25" fill="none"/>
  <circle cx="500" cy="280" r="80" stroke="#007AFF" stroke-width="1.5" opacity="0.15" fill="none"/>
  <line x1="585" y1="365" x2="700" y2="480" stroke="#007AFF" stroke-width="3" opacity="0.25" stroke-linecap="round"/>
  <!-- Data points inside lens -->
  <circle cx="460" cy="250" r="6" fill="#007AFF" opacity="0.3"/>
  <circle cx="520" cy="300" r="6" fill="#007AFF" opacity="0.4"/>
  <circle cx="480" cy="310" r="4" fill="#F8FAFC" opacity="0.2"/>
  <circle cx="540" cy="260" r="5" fill="#007AFF" opacity="0.35"/>
  <circle cx="500" cy="240" r="4" fill="#F8FAFC" opacity="0.15"/>
  <!-- Scattered random elements outside (chaos) -->
  <rect x="800" y="120" width="40" height="40" rx="4" fill="#F8FAFC" opacity="0.05" transform="rotate(15 820 140)"/>
  <rect x="900" y="250" width="30" height="30" rx="4" fill="#007AFF" opacity="0.08" transform="rotate(-20 915 265)"/>
  <rect x="850" y="400" width="35" height="35" rx="4" fill="#F8FAFC" opacity="0.05" transform="rotate(30 867 417)"/>
  <rect x="150" y="450" width="30" height="30" rx="4" fill="#007AFF" opacity="0.06" transform="rotate(-10 165 465)"/>
  <rect x="250" y="100" width="25" height="25" rx="4" fill="#F8FAFC" opacity="0.04" transform="rotate(25 262 112)"/>
</svg>
