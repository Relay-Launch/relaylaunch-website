<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0F172A"/>
  <!-- Scattered rectangles representing disconnected tools -->
  <rect x="80" y="80" width="180" height="120" rx="12" fill="#F8FAFC" opacity="0.08"/>
  <rect x="320" y="200" width="160" height="100" rx="12" fill="#007AFF" opacity="0.12"/>
  <rect x="550" y="60" width="200" height="140" rx="12" fill="#F8FAFC" opacity="0.06"/>
  <rect x="800" y="180" width="140" height="110" rx="12" fill="#007AFF" opacity="0.1"/>
  <rect x="150" y="350" width="170" height="130" rx="12" fill="#F8FAFC" opacity="0.07"/>
  <rect x="420" y="400" width="190" height="100" rx="12" fill="#007AFF" opacity="0.09"/>
  <rect x="700" y="370" width="160" height="120" rx="12" fill="#F8FAFC" opacity="0.06"/>
  <rect x="950" y="80" width="150" height="100" rx="12" fill="#007AFF" opacity="0.08"/>
  <!-- Dashed disconnection lines -->
  <line x1="260" y1="140" x2="320" y2="250" stroke="#F8FAFC" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.12"/>
  <line x1="480" y1="250" x2="550" y2="130" stroke="#F8FAFC" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.12"/>
  <line x1="750" y1="130" x2="800" y2="235" stroke="#F8FAFC" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.12"/>
  <line x1="320" y1="415" x2="420" y2="450" stroke="#F8FAFC" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.12"/>
  <!-- Large diagonal accent line -->
  <line x1="100" y1="550" x2="1100" y2="80" stroke="#007AFF" stroke-width="3" opacity="0.15"/>
  <!-- Geometric accent circles -->
  <circle cx="600" cy="315" r="80" stroke="#007AFF" stroke-width="2" opacity="0.2" fill="none"/>
  <circle cx="600" cy="315" r="40" stroke="#007AFF" stroke-width="1.5" opacity="0.15" fill="none"/>
</svg>
