<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none">
  <!-- Circle emblem -->
  <circle cx="80" cy="64" r="52" stroke="#007AFF" stroke-width="2" fill="none" opacity="0.6"/>
  <circle cx="80" cy="64" r="44" stroke="#007AFF" stroke-width="1.5" stroke-dasharray="6 4" fill="none" opacity="0.3"/>

  <!-- RL Monogram -->
  <text x="54" y="80" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900" fill="#007AFF" letter-spacing="-1">RL</text>

  <!-- Rocket accent -->
  <path d="M88 40 L92 30 L96 40 Z" fill="#007AFF" opacity="0.85"/>
  <circle cx="92" cy="26" r="2.5" fill="#007AFF" opacity="0.6"/>

  <!-- Growth arrow -->
  <path d="M100 60 L112 48 L108 54 L120 42" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Relay Launch text -->
  <text x="144" y="58" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#FFFFFF" letter-spacing="-0.5">
    <tspan>Relay</tspan><tspan fill="#007AFF" font-size="16" dx="3">&#x25BA;</tspan><tspan fill="#FFFFFF" dx="3">Launch</tspan>
  </text>

  <!-- Divider line -->
  <line x1="144" y1="68" x2="310" y2="68" stroke="#007AFF" stroke-width="1" opacity="0.4"/>

  <!-- Tagline -->
  <text x="144" y="86" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#007AFF" letter-spacing="0.5" opacity="0.8">Your Vision, Accelerated.</text>

  <!-- Particle dots -->
  <circle cx="124" cy="24" r="1.5" fill="#007AFF" opacity="0.25"/>
  <circle cx="40" cy="30" r="1.5" fill="#007AFF" opacity="0.2"/>
</svg>
