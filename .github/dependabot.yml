version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tw-animate-css"
      security-critical:
        patterns:
          - "undici"
          - "miniflare"
          - "wrangler"
      security-patches:
        applies-to: security-updates
        dependency-type: production
        update-types:
          - "patch"
          - "minor"
    security-updates:
      enabled: true

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - ci
    groups:
      actions:
        patterns:
          - "*"
