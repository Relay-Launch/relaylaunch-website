name: Bug Report
description: Report a bug on relaylaunch.com
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting this. We review every bug report and prioritize fixes based on impact.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug. What did you see?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Walk us through it step by step.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
  - type: input
    id: page
    attributes:
      label: Page URL
      description: Which page is affected?
      placeholder: https://relaylaunch.com/...
  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - Desktop
        - Mobile
        - Tablet
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
        - Other
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag and drop screenshots if helpful.
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much does this impact your experience?
      options:
        - Minor (cosmetic or low impact)
        - Moderate (feature partially broken)
        - Major (feature completely broken)
        - Critical (site down or security issue)
