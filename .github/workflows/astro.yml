# Builds the Astro site and deploys to Cloudflare Workers via Wrangler.
# Runs on: push to main, manual trigger.
# Pipeline: install > audit > build > verify secrets > deploy.
name: Deploy Astro site to Cloudflare

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        continue-on-error: true
        run: |
          if ! npm audit --audit-level=high 2>&1; then
            echo "::warning::npm audit found high-severity vulnerabilities. Review and update affected packages."
          fi

      - name: Build with Astro
        run: npm run build

      - name: Verify Cloudflare secrets are present
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is missing. Add it in GitHub repo Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "$CF_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret is missing. Add it in GitHub repo Settings > Secrets and variables > Actions."
            exit 1
          fi
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare
        run: npx wrangler deploy --config wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
