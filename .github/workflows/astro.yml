# Builds the Astro site and deploys to Cloudflare Workers via Wrangler.
name: Deploy Astro site to Cloudflare

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build

      - name: Verify Cloudflare secrets are present
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN secret is missing or empty."
            echo "   Go to: GitHub repo → Settings → Secrets and variables → Actions"
            echo "   Add secret named: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$CF_ACCOUNT_ID" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID secret is missing or empty."
            echo "   Go to: GitHub repo → Settings → Secrets and variables → Actions"
            echo "   Add secret named: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          echo "✅ Both secrets present (token: ${#CF_API_TOKEN} chars, account: ${#CF_ACCOUNT_ID} chars)"
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
