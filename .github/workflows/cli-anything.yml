name: CLI-Anything Tests

on:
  push:
    paths:
      - 'tools/cli-anything-*/**'
  pull_request:
    paths:
      - 'tools/cli-anything-*/**'

permissions:
  contents: read

jobs:
  test-gimp-cli:
    name: Test cli-anything-gimp
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: tools/cli-anything-gimp
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,numpy]"

      - name: Run tests
        working-directory: tools/cli-anything-gimp
        run: |
          pytest cli_anything/gimp/tests/ -v --tb=short

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        working-directory: tools/cli-anything-gimp
        run: |
          pytest cli_anything/gimp/tests/ -v --cov=cli_anything.gimp --cov-report=term-missing

      - name: Verify CLI entry point
        working-directory: tools/cli-anything-gimp
        run: |
          cli-anything-gimp --version
          cli-anything-gimp --help
          cli-anything-gimp --json project profiles
