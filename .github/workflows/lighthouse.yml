name: Lighthouse CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Post Lighthouse results as PR comment
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          LIGHTHOUSE_LINKS: ${{ steps.lighthouse.outputs.links }}
          LIGHTHOUSE_MANIFEST: ${{ steps.lighthouse.outputs.manifest }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const links  = JSON.parse(process.env.LIGHTHOUSE_LINKS);
            const manifest = JSON.parse(process.env.LIGHTHOUSE_MANIFEST);

            const scoreIcon = (score) => {
              if (score >= 0.9) return '🟢';
              if (score >= 0.5) return '🟠';
              return '🔴';
            };

            const pct = (score) => `${Math.round(score * 100)}`;

            const rows = manifest.map((run) => {
              const s = run.summary;
              const url = run.url.replace(/^https?:\/\/[^/]+/, '') || '/';
              const link = links[run.url] || '#';
              return `| [\`${url}\`](${link}) | ${scoreIcon(s.performance)} ${pct(s.performance)} | ${scoreIcon(s.accessibility)} ${pct(s.accessibility)} | ${scoreIcon(s.seo)} ${pct(s.seo)} |`;
            });

            const body = [
              '## Lighthouse Results',
              '',
              '| Page | Performance | Accessibility | SEO |',
              '|------|-------------|---------------|-----|',
              ...rows,
              '',
              '_Thresholds: Performance ≥ 95 · Accessibility ≥ 95 · SEO ≥ 95_',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.startsWith('## Lighthouse Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
