name: Lighthouse CI

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Post Lighthouse results as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const links  = JSON.parse('${{ steps.lighthouse.outputs.links }}');
            const manifest = JSON.parse('${{ steps.lighthouse.outputs.manifest }}');

            const scoreIcon = (score) => {
              if (score >= 0.9) return '🟢';
              if (score >= 0.5) return '🟠';
              return '🔴';
            };

            const pct = (score) => `${Math.round(score * 100)}`;

            const rows = manifest.map((run) => {
              const s = run.summary;
              const url = run.url.replace(/^https?:\/\/[^/]+/, '') || '/';
              const link = links[run.url] || '#';
              return `| [\`${url}\`](${link}) | ${scoreIcon(s.performance)} ${pct(s.performance)} | ${scoreIcon(s.accessibility)} ${pct(s.accessibility)} | ${scoreIcon(s.seo)} ${pct(s.seo)} |`;
            });

            const body = [
              '## Lighthouse Results',
              '',
              '| Page | Performance | Accessibility | SEO |',
              '|------|-------------|---------------|-----|',
              ...rows,
              '',
              '_Thresholds: Performance ≥ 90 · Accessibility ≥ 90 · SEO ≥ 90_',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.startsWith('## Lighthouse Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
